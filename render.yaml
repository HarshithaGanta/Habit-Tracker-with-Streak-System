services:
  - type: web
    name: habit-tracker-api
    runtime: python
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: APP_TIMEZONE
        value: Asia/Kolkata
