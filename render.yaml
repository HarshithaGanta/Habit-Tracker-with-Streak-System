services:
  - type: web
    name: habit-tracker-node
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /var/data
    disk:
      name: habit-tracker-data
      mountPath: /var/data
      sizeGB: 1
