services:
  - type: web
    name: habit-tracker-api
    runtime: python
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: habit-tracker-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: APP_TIMEZONE
        value: Asia/Kolkata
      - key: DATABASE_PATH
        value: /var/data/habit_tracker.db
